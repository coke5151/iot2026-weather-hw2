name: Refresh Weather Data

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CWA_API_KEY: ${{ secrets.CWA_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh shared weather cache
        run: python fetch_weather_data.py

      - name: Check cache diff
        id: cache_diff
        run: |
          git add weather_data.csv data.db
          if git diff --cached --quiet -- weather_data.csv data.db; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected in weather_data.csv / data.db"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Detected updates in weather_data.csv / data.db"
            git diff --cached --stat -- weather_data.csv data.db
          fi

      - name: Commit updated cache
        if: steps.cache_diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: refresh weather cache"
          git push
