<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Taiwan 7-Day Weather Dashboard</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      :root {
        --bg: #f3f6fa;
        --panel: #ffffff;
        --line: #d9e1ec;
        --text: #1f2a37;
        --muted: #5b6878;
        --accent: #005bbf;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
        color: var(--text);
        background: linear-gradient(180deg, #eaf3fb 0%, var(--bg) 180px);
      }

      .container {
        max-width: 1280px;
        margin: 0 auto;
        padding: 20px 16px 28px;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        flex-wrap: wrap;
        gap: 12px;
        margin-bottom: 14px;
      }

      h1 {
        margin: 0;
        font-size: 1.45rem;
      }

      .subtext {
        margin-top: 4px;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .control-row {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      select {
        border-radius: 8px;
        border: 1px solid var(--line);
        background: white;
        color: var(--text);
        padding: 8px 12px;
        font-size: 0.95rem;
      }

      .layout {
        display: grid;
        gap: 16px;
        grid-template-columns: 1.6fr 1fr;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 12px;
      }

      .card h2 {
        margin: 0 0 10px;
        font-size: 1.05rem;
      }

      #map {
        width: 100%;
        height: 620px;
        border-radius: 10px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.95rem;
      }

      th,
      td {
        border-bottom: 1px solid var(--line);
        text-align: left;
        padding: 8px 6px;
      }

      th {
        background: #f7fafc;
      }

      .legend {
        margin-top: 12px;
        font-size: 0.9rem;
        color: var(--muted);
      }

      .status {
        margin-top: 10px;
        min-height: 20px;
        font-size: 0.9rem;
        color: var(--muted);
      }

      @media (max-width: 1024px) {
        .layout {
          grid-template-columns: 1fr;
        }
        #map {
          height: 460px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div>
          <h1>Taiwan 7-Day Weather Dashboard</h1>
          <div class="subtext">
            資料來源：CWA F-A0010-001（農業天氣預報）｜色階：藍 &lt;20、綠 20-25、黃 25-30、紅 &gt;30
          </div>
        </div>
        <div class="control-row">
          <label for="date-select">日期：</label>
          <select id="date-select"></select>
        </div>
      </div>

      <div class="layout">
        <div class="card">
          <h2>地圖檢視</h2>
          <div id="map"></div>
          <div class="legend">點擊地圖標記可查看各區域溫度明細。</div>
        </div>
        <div class="card">
          <h2>日期資料表</h2>
          <table>
            <thead>
              <tr>
                <th>地區</th>
                <th>最低溫</th>
                <th>最高溫</th>
                <th>平均溫</th>
              </tr>
            </thead>
            <tbody id="table-body"></tbody>
          </table>
          <div class="status" id="status-text">載入中...</div>
        </div>
      </div>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script>
      const dateSelect = document.getElementById("date-select");
      const tableBody = document.getElementById("table-body");
      const statusText = document.getElementById("status-text");

      const map = L.map("map").setView([23.7, 121.0], 7);
      L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
        attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
      }).addTo(map);

      let weatherData = [];
      const markersLayer = L.layerGroup().addTo(map);

      function colorByAvgTemp(avgTemp) {
        if (avgTemp < 20) return "blue";
        if (avgTemp <= 25) return "green";
        if (avgTemp <= 30) return "yellow";
        return "red";
      }

      function renderDateOptions() {
        const dates = [...new Set(weatherData.map((row) => row.date))].sort();
        dateSelect.innerHTML = "";
        dates.forEach((date) => {
          const option = document.createElement("option");
          option.value = date;
          option.textContent = date;
          dateSelect.appendChild(option);
        });
      }

      function renderMapAndTable(selectedDate) {
        const rows = weatherData.filter((row) => row.date === selectedDate);
        markersLayer.clearLayers();
        tableBody.innerHTML = "";

        rows.forEach((row) => {
          const avgTemp = Number(row.avg_temp);
          const markerColor = colorByAvgTemp(avgTemp);
          const popupHtml = `
            <strong>${row.region}</strong><br/>
            日期: ${row.date}<br/>
            最低溫: ${Number(row.min_temp).toFixed(1)}°C<br/>
            最高溫: ${Number(row.max_temp).toFixed(1)}°C<br/>
            平均溫: ${avgTemp.toFixed(1)}°C
          `;

          L.circleMarker([Number(row.lat), Number(row.lon)], {
            radius: 10,
            color: markerColor,
            fillColor: markerColor,
            fillOpacity: 0.8,
            weight: 1,
          })
            .bindPopup(popupHtml)
            .addTo(markersLayer);

          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${row.region}</td>
            <td>${Number(row.min_temp).toFixed(1)}°C</td>
            <td>${Number(row.max_temp).toFixed(1)}°C</td>
            <td>${avgTemp.toFixed(1)}°C</td>
          `;
          tableBody.appendChild(tr);
        });

        statusText.textContent = `${selectedDate} 共 ${rows.length} 筆區域資料。前端目前只顯示後端共享快取。`;
      }

      async function fetchWeatherData() {
        statusText.textContent = "正在讀取後端共享快取...";
        try {
          const response = await fetch("/api/weather", { method: "GET" });
          const result = await response.json();
          if (!response.ok) {
            throw new Error(result.error || "API request failed");
          }
          weatherData = result.data || [];
          if (!weatherData.length) {
            throw new Error("API 回傳空資料。");
          }
          renderDateOptions();
          renderMapAndTable(dateSelect.value);
        } catch (error) {
          statusText.textContent = `載入失敗：${error.message}`;
        }
      }

      dateSelect.addEventListener("change", (event) => {
        renderMapAndTable(event.target.value);
      });

      fetchWeatherData();
    </script>
  </body>
</html>
